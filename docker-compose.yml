services:
  petid-dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: petid-dev
    working_dir: /app
    ports:
      - "3000:3000"
    env_file:
      - .env.local
    environment:
      NODE_ENV: development
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
    volumes:
      - .:/app
      - petid_node_modules:/app/node_modules
    stdin_open: true
    tty: true
    command: sh -c "npm install && npm run dev -- --hostname 0.0.0.0 --port 3000"

volumes:
  petid_node_modules:
